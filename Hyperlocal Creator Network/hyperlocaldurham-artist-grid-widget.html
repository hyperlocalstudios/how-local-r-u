<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Grid Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000;
    --white: #fff;
    --muted: #888;
    --card-min: 180px;
  }

  body {
    background: transparent;
    font-family: 'Nunito Sans', sans-serif;
  }

  /* ── GRID ── */
  .artist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-min), 1fr));
    border-left: 1px solid var(--black);
    border-top: 1px solid var(--black);
    background: transparent;
  }

  /* ── CARD ── */
  .artist-card {
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    background: var(--white);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    flex-direction: column;
  }

  .artist-card:hover {
    background: var(--black);
    color: var(--white);
  }

  /* portrait wrapper */
  .card-portrait {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-portrait img,
  .card-portrait .placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* placeholder silhouette */
  .placeholder {
    background: #e8e8e8;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .placeholder svg {
    width: 60%;
    height: 60%;
    fill: #bbb;
  }

  /* gradient overlay */
  .card-portrait-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
    pointer-events: none;
  }

  /* studio overlay on image */
  .card-studio-overlay {
    position: absolute;
    bottom: 8px;
    left: 10px;
    right: 10px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }

  .card-studio-name {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.2;
    flex: 1;
  }

  .studio-badge {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .studio-badge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .studio-badge-initials {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 7px;
    font-weight: 700;
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1;
    padding: 2px;
  }

  /* card body */
  .card-body {
    padding: 10px 12px 12px;
    flex: 1;
  }

  .card-name {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.3;
    color: inherit;
  }

  .card-in-machine {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.35;
  }

  .artist-card:hover .card-in-machine {
    color: #aaa;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    background: var(--white);
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 0; right: 0;
    width: 40px;
    height: 40px;
    background: var(--black);
    color: var(--white);
    border: none;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    flex-shrink: 0;
  }

  .modal-close:hover {
    background: #333;
  }

  .modal-inner {
    display: flex;
    flex-direction: row;
  }

  @media (max-width: 480px) {
    .modal-inner { flex-direction: column; }
  }

  /* modal portrait */
  .modal-portrait-wrap {
    position: relative;
    width: 220px;
    min-width: 220px;
    aspect-ratio: 1 / 1;
    flex-shrink: 0;
    overflow: hidden;
  }

  @media (max-width: 480px) {
    .modal-portrait-wrap {
      width: 100%;
      min-width: unset;
    }
  }

  .modal-portrait-wrap img,
  .modal-portrait-wrap .placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal-studio-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 64px;
    height: 64px;
    background: var(--white);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-studio-badge img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-studio-badge-initials {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: var(--black);
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
    padding: 2px;
  }

  /* modal content */
  .modal-content {
    padding: 28px 24px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-left: 1px solid var(--black);
  }

  @media (max-width: 480px) {
    .modal-content {
      border-left: none;
      border-top: 1px solid var(--black);
    }
  }

  .modal-header {}

  .modal-artist-name {
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
    color: var(--black);
  }

  .modal-studio-name {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .modal-divider {
    width: 100%;
    height: 1px;
    background: var(--black);
  }

  .modal-in-machine-label {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .modal-in-machine-value {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--black);
    line-height: 1.4;
  }

  .modal-bio-label {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .modal-bio-text {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 13px;
    color: var(--black);
    line-height: 1.6;
  }

  .modal-bio-text.empty {
    font-style: italic;
    color: var(--muted);
  }

  /* social links */
  .modal-social-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .modal-social-link {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
    border: 1px solid var(--black);
    padding: 8px 12px;
    transition: background 0.15s, color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .modal-social-link:hover {
    background: var(--black);
    color: var(--white);
  }

  .modal-social-link svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* ── COMING SOON BANNER ── */
  .card-coming-soon .card-portrait::after {
    content: 'COMING SOON';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-family: 'Nunito Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--white);
    background: var(--black);
    padding: 5px 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
  }

  .card-coming-soon .card-portrait img,
  .card-coming-soon .card-portrait .placeholder {
    opacity: 0.35;
    filter: grayscale(100%);
  }
</style>
</head>
<body>

<div class="artist-grid" id="artistGrid"></div>

<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-inner">
      <div class="modal-portrait-wrap" id="modalPortraitWrap">
        <!-- portrait or placeholder injected here -->
        <div class="modal-studio-badge" id="modalBadge"></div>
      </div>
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-artist-name" id="modalName"></div>
          <div class="modal-studio-name" id="modalStudio"></div>
        </div>
        <div class="modal-divider"></div>
        <div>
          <div class="modal-in-machine-label">In the machine</div>
          <div class="modal-in-machine-value" id="modalInMachine"></div>
        </div>
        <div class="modal-divider"></div>
        <div>
          <div class="modal-bio-label">Bio</div>
          <div class="modal-bio-text" id="modalBio"></div>
        </div>
        <div id="modalSocialSection" style="display: none;">
          <div class="modal-divider"></div>
          <div class="modal-social-links" id="modalSocialLinks"></div>
        </div>
      </div>
    </div>
  </div>
</div>

const artists = [

function getInitials(studio) {
  return studio.split(/\s+/).map(w => w[0]).join('').slice(0, 3).toUpperCase();
}

function badgeHTML(studioLogo, studio, size) {
  if (studioLogo) {
    return `<img src="${studioLogo}" alt="${studio} logo">`;
  }
  return `<span class="${size === 'modal' ? 'modal-studio-badge-initials' : 'studio-badge-initials'}">${getInitials(studio)}</span>`;
}

function portraitHTML(portrait, name) {
  if (portrait) {
    return `<img src="${portrait}" alt="${name}">`;
  }
  return `<div class="placeholder">${SILHOUETTE}</div>`;
}

function buildCard(artist, index) {
  const card = document.createElement('div');
  card.className = 'artist-card' + (artist.comingSoon ? ' card-coming-soon' : '');
  card.setAttribute('tabindex', '0');
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `View ${artist.name}`);

  card.innerHTML = `
    <div class="card-portrait">
      ${portraitHTML(artist.portrait, artist.name)}
      <div class="card-portrait-gradient"></div>
      <div class="card-studio-overlay">
        <span class="card-studio-name">${artist.studio}</span>
        ${artist.studioLogo ? `<div class="studio-badge">${badgeHTML(artist.studioLogo, artist.studio, 'card')}</div>` : ''}
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${artist.name}</div>
      <div class="card-in-machine">${artist.inMachine}</div>
    </div>
  `;

  card.addEventListener('click', () => openModal(index));
  card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(index); } });

  return card;
}

const grid = document.getElementById('artistGrid');
artists.forEach((artist, i) => grid.appendChild(buildCard(artist, i)));

// modal
const backdrop = document.getElementById('modalBackdrop');
const modal = document.getElementById('modal');
const modalClose = document.getElementById('modalClose');

function openModal(index) {
  const a = artists[index];

  // portrait
  const wrap = document.getElementById('modalPortraitWrap');
  // clear previous portrait (keep badge)
  const badge = document.getElementById('modalBadge');
  wrap.innerHTML = '';
  wrap.appendChild(badge);

  if (a.portrait) {
    const img = document.createElement('img');
    img.src = a.portrait;
    img.alt = a.name;
    wrap.insertBefore(img, badge);
  } else {
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.innerHTML = SILHOUETTE;
    wrap.insertBefore(ph, badge);
  }

  // badge
  if (a.studioLogo) {
    badge.innerHTML = badgeHTML(a.studioLogo, a.studio, 'modal');
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }

  document.getElementById('modalName').textContent = a.name;
  document.getElementById('modalStudio').textContent = a.studio;
  document.getElementById('modalInMachine').textContent = a.inMachine;

  const bioEl = document.getElementById('modalBio');
  if (a.bio && a.bio.trim()) {
    bioEl.textContent = a.bio;
    bioEl.classList.remove('empty');
  } else {
    bioEl.textContent = 'Bio coming soon.';
    bioEl.classList.add('empty');
  }

  // social links
  const socialSection = document.getElementById('modalSocialSection');
  const socialLinks = document.getElementById('modalSocialLinks');
  socialLinks.innerHTML = '';

  const hasWebsite = a.website && a.website.trim();
  const hasInstagram = a.instagram && a.instagram.trim();
  const hasCustomLink = a.customLink && a.customLink.url && a.customLink.url.trim();

  if (hasWebsite || hasInstagram || hasCustomLink) {
    if (hasWebsite) {
      const link = document.createElement('a');
      link.href = a.website;
      link.className = 'modal-social-link';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = `${WEBSITE_ICON}Website`;
      socialLinks.appendChild(link);
    }

    if (hasInstagram) {
      const link = document.createElement('a');
      link.href = a.instagram.startsWith('http') ? a.instagram : `https://instagram.com/${a.instagram.replace('@', '')}`;
      link.className = 'modal-social-link';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = `${INSTAGRAM_ICON}Instagram`;
      socialLinks.appendChild(link);
    }

    if (hasCustomLink) {
      const link = document.createElement('a');
      link.href = a.customLink.url;
      link.className = 'modal-social-link';
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = `${LINK_ICON}${a.customLink.label}`;
      socialLinks.appendChild(link);
    }

    socialSection.style.display = 'block';
  } else {
    socialSection.style.display = 'none';
  }

  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  modalClose.focus();
}

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
